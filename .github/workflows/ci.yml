name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  brew:
    name: brew
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
          - runner: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Tap local checkout
        run: brew tap loonfs/tap "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --strict loonfs/tap/loon

      - name: Install formula
        run: brew install loonfs/tap/loon

      - name: Test formula
        run: brew test loon
